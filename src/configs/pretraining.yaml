# SparK pretraining configuration
# task_roots defined in kaggle_run.py
# Set wandb_run_id to resume an existing WandB run (get the ID from the run URL)
# e.g. https://wandb.ai/entity/cssl-medical/runs/ic5uk3tm  →  ic5uk3tm
wandb_run_id: "ic5uk3tm"
output_dir:      "/kaggle/working/checkpoints/pretrain"

# Model
channels:        [32, 64, 128, 256, 512]
strides:         [2, 2, 2, 2]

# SparK masking
spark_patch_size: 16
mask_ratio:       0.75

# Training
epochs:          100
warmup_epochs:   5
batch_size:      2
lr:              1.0e-4
weight_decay:    0.05
patch_size:      96
num_workers:     2
cache_rate:      0.05
save_every:      20
