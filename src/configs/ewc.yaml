# EWC continual learning configuration
# task_roots defined in kaggle_run.py
strategy:          "ewc"
output_dir:        "/kaggle/working/checkpoints/ewc"
pretrained_ckpt:   "/kaggle/working/checkpoints/pretrain/best.pth"
use_pretrained:    true

task_order:        ["liver", "pancreas", "heart"]
channels:          [32, 64, 128, 256, 512]
strides:           [2, 2, 2, 2]

# EWC
ewc_lambda:        1000.0
fisher_batches:    100

# Training per task
epochs_per_task:   15
warmup_epochs:     2
encoder_lr_scale:  1.0
batch_size:        2
lr:                1.0e-4
weight_decay:      1.0e-5
num_workers:       2
cache_rate:        0.1

# GPU memory management (FIXED)
pin_memory:        false  # Disable to prevent MetaTensor corruption
