# Experience Replay continual learning configuration
data_root:         "/kaggle/input/medical-segmentation-decathlon"
output_dir:        "/kaggle/working/checkpoints/replay"
pretrained_ckpt:   "/kaggle/working/checkpoints/pretrain/pretrained_encoder_best.pth"
use_pretrained:    true

task_order:        ["liver", "pancreas", "heart"]
channels:          [32, 64, 128, 256, 512]
strides:           [2, 2, 2, 2]

# Replay buffer
buffer_capacity:   200     # RQ4: ablate over [50, 100, 200, 500]
replay_batch_size: 2

# Training per task
epochs_per_task:   50
batch_size:        2
lr:                1.0e-4
weight_decay:      1.0e-5
num_workers:       2
cache_rate:        0.1
