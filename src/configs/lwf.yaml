# LwF continual learning configuration
# task_roots defined in kaggle_run.py
output_dir:        "/kaggle/working/checkpoints/lwf"
pretrained_ckpt:   "/kaggle/working/checkpoints/pretrain/best.pth"
use_pretrained:    true

task_order:        ["liver", "pancreas", "heart"]
channels:          [32, 64, 128, 256, 512]
strides:           [2, 2, 2, 2]

# LwF
lwf_alpha:         1.0
lwf_temperature:   2.0

# Training per task
epochs_per_task:   15
batch_size:        2
lr:                1.0e-4
weight_decay:      1.0e-5
num_workers:       2
cache_rate:        0.1
